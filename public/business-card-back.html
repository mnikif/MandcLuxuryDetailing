<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M&C Luxury Detailing — Business Card Back</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600;1,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Space Mono', monospace;
  }

  .card {
    width: 3.5in;
    height: 2in;
    background: #060606;
    display: flex;
    flex-direction: row;
    overflow: hidden;
    position: relative;
    border: 1px solid #1c1c1c;
    box-shadow: 0 8px 40px rgba(0,0,0,0.8), 0 0 0 0.5px #222;
  }

  /* ── Left: Services section ── */
  .services-section {
    width: 52%;
    height: 100%;
    padding: 0.18in 0.18in 0.18in 0.2in;
    display: flex;
    flex-direction: column;
    justify-content: center;
    flex-shrink: 0;
  }

  .services-header {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 700;
    font-size: 14pt;
    color: #f2ede4;
    line-height: 1;
    margin-bottom: 0.04in;
  }

  .services-header span {
    color: #c9a84c;
  }

  .gold-rule {
    width: 0.32in;
    height: 1px;
    background: linear-gradient(to right, #c9a84c, transparent);
    margin-bottom: 0.08in;
  }

  .service-list {
    display: flex;
    flex-direction: column;
    gap: 0.04in;
    margin-bottom: 0.08in;
  }

  .service-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.06in;
  }

  .service-name {
    display: flex;
    align-items: center;
    gap: 0.04in;
    font-size: 5.4pt;
    color: #a8a8a8;
    letter-spacing: 0.04em;
    flex: 1;
  }

  .service-name .dot {
    color: #c9a84c;
    font-size: 4pt;
    flex-shrink: 0;
  }

  .service-dots {
    flex: 1;
    height: 1px;
    background: repeating-linear-gradient(
      to right,
      #2a2a2a 0px,
      #2a2a2a 2px,
      transparent 2px,
      transparent 4px
    );
    margin: 0 0.04in;
  }

  .service-price {
    font-size: 5.4pt;
    color: #c9a84c;
    letter-spacing: 0.05em;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .bottom-note {
    font-size: 4.2pt;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #2e2e2e;
    line-height: 1.5;
  }

  /* ── Vertical divider ── */
  .divider {
    width: 1px;
    height: 68%;
    background: linear-gradient(to bottom,
      transparent 0%,
      #c9a84c 25%,
      #c9a84c 75%,
      transparent 100%
    );
    align-self: center;
    flex-shrink: 0;
    opacity: 0.7;
  }

  /* ── Right: QR section ── */
  .qr-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 10px 8px;
    min-width: 0;
    overflow: hidden;
  }

  .qr-wrapper {
    position: relative;
    flex-shrink: 0;
    line-height: 0;
  }

  .qr-wrapper img {
    width: 100px;
    height: 100px;
    display: block;
  }

  .scan-label {
    text-align: center;
    line-height: 1.5;
    flex-shrink: 0;
  }

  .scan-label .scan-me {
    display: block;
    font-size: 6pt;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #c9a84c;
    font-weight: 700;
  }

  .scan-label .scan-sub {
    display: block;
    font-size: 4.5pt;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #4a4a4a;
  }

  /* Corner accents on card */
  .corner-tl {
    position: absolute;
    top: 0.08in;
    left: 0.08in;
    width: 0.1in;
    height: 0.1in;
    border-top: 1px solid rgba(201,168,76,0.3);
    border-left: 1px solid rgba(201,168,76,0.3);
  }

  .corner-br {
    position: absolute;
    bottom: 0.08in;
    right: 0.08in;
    width: 0.1in;
    height: 0.1in;
    border-bottom: 1px solid rgba(201,168,76,0.3);
    border-right: 1px solid rgba(201,168,76,0.3);
  }

  @media print {
    body {
      background: none;
      min-height: auto;
    }
    .card {
      box-shadow: none;
      border: none;
    }
  }
</style>
</head>
<body>
<div class="card">

  <!-- Services -->
  <div class="services-section">
    <div class="services-header">Our <span>Services</span></div>
    <div class="gold-rule"></div>

    <div class="service-list">
      <div class="service-row">
        <span class="service-name"><span class="dot">✦</span> Interior Detail</span>
        <span class="service-dots"></span>
        <span class="service-price">from $169</span>
      </div>
      <div class="service-row">
        <span class="service-name"><span class="dot">✦</span> Exterior Detail</span>
        <span class="service-dots"></span>
        <span class="service-price">from $99</span>
      </div>
      <div class="service-row">
        <span class="service-name"><span class="dot">✦</span> Full Detail</span>
        <span class="service-dots"></span>
        <span class="service-price">from $229</span>
      </div>
      <div class="service-row">
        <span class="service-name"><span class="dot">✦</span> Exterior Wax</span>
        <span class="service-dots"></span>
        <span class="service-price">+$50 add-on</span>
      </div>
    </div>

    <div class="bottom-note">We come to you · All of North Shore, MA</div>
  </div>

  <!-- Divider -->
  <div class="divider"></div>

  <!-- QR Code -->
  <div class="qr-section">
    <div class="qr-wrapper">

    </div>

    <div class="scan-label">
      <span class="scan-me">Scan Me</span>
      <span class="scan-sub">to visit our website</span>
    </div>
  </div>

  <!-- Corner accents -->
  <div class="corner-tl"></div>
  <div class="corner-br"></div>

</div>
</body>
</html>
